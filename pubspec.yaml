name: habify
description: A daily habit tracker with streaks, reminders, and weekly insights.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.2
  intl: ^0.19.0
  uuid: ^4.4.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
